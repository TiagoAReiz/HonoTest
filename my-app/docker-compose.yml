services:
  postgres:
    image: postgres:17-alpine
    container_name: honotest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hono
      POSTGRES_PASSWORD: hono
      POSTGRES_DB: honotest
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hono -d honotest']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
